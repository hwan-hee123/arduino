<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Brown</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      overflow: hidden;
    }

    .thumbnail {
      position: relative;
      width: 1920px;
      height: 1080px;
      background: #fff;
      overflow: hidden;
    }

    /* 배경 이미지 */
    .bg-image {
      position: absolute;
      left: -132.93px;
      top: 0;
      width: 2052.93px;
      height: 1177.995px;
      object-fit: cover;
      pointer-events: none;
    }

    /* 하단 흰색 그라데이션 오버레이 */
    .gradient-overlay {
      position: absolute;
      left: 0;
      top: 524.45px;
      width: 1920px;
      height: 681.78px;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0), #ffffff);
    }

    /* Team Brown 텍스트 */
    .team-title {
      position: absolute;
      left: 17.61px;
      top: 810px;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      font-style: normal;
      font-size: 192.706px;
      line-height: 1.4;
      letter-spacing: -21.1976px;
      color: #0089ff;
      white-space: nowrap;
      word-break: break-word;
    }

    /* 반응형: 화면에 맞게 스케일 */
    @media screen and (max-width: 1920px) {
      body {
        overflow: auto;
      }

      .thumbnail {
        transform-origin: top left;
        transform: scale(var(--scale, 1));
      }
    }
  </style>
</head>
<body>
  <div class="thumbnail" data-node-id="1:2" data-name="썸네일">
    <img
      class="bg-image"
      src="https://www.figma.com/api/mcp/asset/deb753a7-dacf-4d1c-ac88-27e0f351b249"
      alt="Team Brown background"
    />
    <div class="gradient-overlay" data-node-id="57:35"></div>
    <p class="team-title" data-node-id="57:34">Team Brown</p>
  </div>

  <script>
    function scaleToFit() {
      const scale = Math.min(
        window.innerWidth / 1920,
        window.innerHeight / 1080
      );
      document.documentElement.style.setProperty('--scale', scale);
      document.querySelector('.thumbnail').style.transform = `scale(${scale})`;
    }
    scaleToFit();
    window.addEventListener('resize', scaleToFit);
  </script>
</body>
</html>
